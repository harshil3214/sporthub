<div class="league-group card-glass p-3 mb-3">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <span class="fw-bold text-info">{{ country }}</span>
      <span class="text-secondary">/</span>
      <span class="fw-bold">{{ competition }}</span>
      <span class="badge bg-dark border border-secondary">{{ matches|length }}</span>
    </div>
    <button class="btn btn-sm btn-outline-light" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#{{ collapse_id }}">
      Toggle
    </button>
  </div>

  <div class="collapse show mt-2" id="{{ collapse_id }}">
    <div class="mt-2">
      {% for row in matches %}
        {% include "core/partials/match_row.html" with row=row %}
        {% if not forloop.last %}
          <hr class="my-2" style="border-color: rgba(148,163,184,.15);">
        {% endif %}
      {% endfor %}
    </div>
  </div>
</div>
