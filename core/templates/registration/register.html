{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Hub - Create Account</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            margin: 0;
            background: linear-gradient(rgba(10, 20, 35, 0.7), rgba(10, 20, 35, 0.7)), 
                        url("https://images.unsplash.com/photo-1504450758481-7338eba7524a?q=80&w=2069&auto=format&fit=crop") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .register-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(0, 212, 255, 0.4);
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #FFD700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #94a3b8; margin-bottom: 25px; }
        
        /* Styling the auto-generated Django form */
        form p { text-align: left; color: #f8fafc; font-size: 0.9rem; margin-bottom: 15px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.1);
        }

        .helptext { display: block; font-size: 0.75rem; color: #64748b; margin-top: 5px; }
        
        .signup-btn {
            width: 100%;
            padding: 14px;
            background: #00d4ff;
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        
        .signup-btn:hover { 
            background: #00b8e6; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .footer-link { margin-top: 25px; font-size: 0.9rem; color: #94a3b8; }
        .footer-link a { color: #00d4ff; text-decoration: none; font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }

        /* Error Messages Styling */
        .error-container {
            color: #ef4444; 
            background: rgba(239, 68, 68, 0.1); 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            text-align: left; 
            font-size: 0.85rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        ul.errorlist {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>JOIN THE ARENA</h1>
        <p>Create your account to start tracking matches.</p>

        <form method="post">
            {% csrf_token %} {% if form.errors %}
                <div class="error-container">
                    <strong>Please fix the following errors:</strong>
                    {{ form.errors }}
                </div>
            {% endif %}

            {{ form.as_p }}
            
            <button type="submit" class="signup-btn">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>
</body>
</html>
